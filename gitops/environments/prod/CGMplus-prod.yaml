apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cgmplus-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TUES-2026-PBL-11-klas/Colonel-Sanders-CGMplus.git
    targetRevision: main
    path: gitops/environments/prod/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

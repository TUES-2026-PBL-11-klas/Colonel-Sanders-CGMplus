apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gtfs-ingress
  namespace: gtfs
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: gtfs-dev.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gtfs-service
                port:
                  number: 5000

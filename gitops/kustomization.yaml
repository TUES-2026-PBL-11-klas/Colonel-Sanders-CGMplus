apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingress/ingress.yaml
  - database/auth-postgres.yaml
  - services/gtfs
  - services/auth
  - azure-secrets

patches:
  - path: environments/prod/manifests/auth-image-patch.yaml
    target:
      kind: Deployment
      name: auth
      namespace: services
  - path: environments/prod/manifests/gtfs-image-patch.yaml
    target:
      kind: Deployment
      name: gtfs
      namespace: services
  - path: environments/prod/manifests/auth-acr-pullsecret-patch.yaml
    target:
      kind: Deployment
      name: auth
      namespace: services
  - path: environments/prod/manifests/gtfs-acr-pullsecret-patch.yaml
    target:
      kind: Deployment
      name: gtfs
      namespace: services

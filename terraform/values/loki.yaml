deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

singleBinary:
  replicas: 1

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false

test:
  enabled: false

persistence:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false
name: Build and Update GitOps

on:
  push:
    branches: [main, feature/DevOpsTest]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/nginx-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}

      - name: Update GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/TUES-2026-PBL-11-klas/CS-CGM-DEVOPS
          cd services/nginx
          sed -i "s|image: .*|image: ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}|" deployment.yaml
          git config user.name "ci"
          git config user.email "ci@bot.com"
          if git diff --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -am "Update image"
            git push
          fi
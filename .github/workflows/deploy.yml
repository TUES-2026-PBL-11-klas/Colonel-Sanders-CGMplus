name: Build and Deploy GTFS (GitOps)

on:
  push:
    branches: [main, feature/DevOpsTest]
    paths-ignore:
      - gitops/**
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-update-gitops:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/gtfs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} -f services/gtfs/Dockerfile services/gtfs

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}

      - name: Update in-repo GitOps manifests
        run: |
          sed -i "s|image: .*|image: ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}|" gitops/services/gtfs/deployment.yaml

          git config user.name "ci"
          git config user.email "ci@bot.com"

          git add gitops/services/gtfs/deployment.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore(gitops): update gtfs image to ${{ github.sha }}"
            git push
          fi

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[GTFS CD] status: ${STATUS} | branch: ${BRANCH} | image: ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
name: Build And Promote Service Images

on:
  push:
    branches: [main, development]
    paths:
      - services/gtfs/**
      - services/auth-new/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: gtfs
            dockerfile: services/gtfs/Dockerfile
            context: services/gtfs
            image_name: gtfs
            manifest_path: gitops/services/gtfs/deployment.yaml
          - service_name: auth-new
            dockerfile: services/auth-new/Dockerfile
            context: services/auth-new
            image_name: auth-new
            manifest_path: gitops/services/auth/deployment.yaml

    env:
      REGISTRY: docker.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}"
          echo "IMAGE_NAME_LC=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login ${REGISTRY} -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[Service Build] status: ${STATUS} | branch: ${BRANCH} | service: ${{ matrix.service_name }} | image: ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"

  update-gitops-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tags in GitOps manifests
        run: |
          DOCKERHUB_USER_LC=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')

          sed -i "s|image: .*[/]gtfs:.*|image: docker.io/${DOCKERHUB_USER_LC}/gtfs:${{ github.sha }}|" gitops/services/gtfs/deployment.yaml
          sed -i "s|image: .*[/]auth-new:.*|image: docker.io/${DOCKERHUB_USER_LC}/auth-new:${{ github.sha }}|" gitops/services/auth/deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "ci"
          git config user.email "ci@bot.com"

          git add gitops/services/gtfs/deployment.yaml gitops/services/auth/deployment.yaml

          if git diff --cached --quiet; then
            echo "No GitOps manifest changes to commit"
          else
            git commit -m "chore(gitops): update service images to ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[GitOps Promote] status: ${STATUS} | branch: ${BRANCH} | sha: ${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
name: Build And Promote Service Images

on:
  push:
    branches: [main, development]
    paths:
      - services/gtfs/**
      - services/auth-new/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: gtfs
            dockerfile: services/gtfs/Dockerfile
            context: services/gtfs
            image_name: gtfs
          - service_name: auth-new
            dockerfile: services/auth-new/Dockerfile
            context: services/auth-new
            image_name: auth-new
            manifest_path: gitops/services/auth/deployment.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select target environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TARGET_ENV=prod" >> $GITHUB_ENV
            echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
            echo "REGISTRY=docker.io" >> $GITHUB_ENV
          fi

      - name: Set image name
        run: |
          if [ "$TARGET_ENV" = "prod" ]; then
            IMAGE_NAME="${REGISTRY}/${{ matrix.image_name }}"
          else
            DOCKERHUB_USER_LC=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_NAME="${REGISTRY}/${DOCKERHUB_USER_LC}/${{ matrix.image_name }}"
          fi
          echo "IMAGE_NAME=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${IMAGE_NAME}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Login to ACR
        if: github.ref_name == 'main'
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Login to Docker Hub
        if: github.ref_name != 'main'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login ${REGISTRY} -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push ${IMAGE_NAME}:${{ github.sha }}

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[Service Build] status: ${STATUS} | branch: ${BRANCH} | service: ${{ matrix.service_name }} | image: ${IMAGE_NAME}:${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"

  update-gitops-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tags in environment overlay
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            ACR_LC=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | tr '[:upper:]' '[:lower:]')
            sed -i "s|image: .*auth-new:.*|image: ${ACR_LC}/auth-new:${{ github.sha }}|" gitops/environments/prod/manifests/auth-image-patch.yaml
            sed -i "s|image: .*gtfs:.*|image: ${ACR_LC}/gtfs:${{ github.sha }}|" gitops/environments/prod/manifests/gtfs-image-patch.yaml
          else
            DOCKERHUB_USER_LC=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
            sed -i "s|image: .*auth-new:.*|image: docker.io/${DOCKERHUB_USER_LC}/auth-new:${{ github.sha }}|" gitops/environments/dev/manifests/auth-image-patch.yaml
            sed -i "s|image: .*gtfs:.*|image: docker.io/${DOCKERHUB_USER_LC}/gtfs:${{ github.sha }}|" gitops/environments/dev/manifests/gtfs-image-patch.yaml
          fi

      - name: Commit and push manifest changes
        run: |
          git config user.name "ci"
          git config user.email "ci@bot.com"

            git add gitops/environments/dev/manifests/auth-image-patch.yaml \
              gitops/environments/dev/manifests/gtfs-image-patch.yaml \
              gitops/environments/prod/manifests/auth-image-patch.yaml \
              gitops/environments/prod/manifests/gtfs-image-patch.yaml

          if git diff --cached --quiet; then
            echo "No GitOps manifest changes to commit"
          else
            git commit -m "chore(gitops): update ${{ github.ref_name }} image tags to ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[GitOps Promote] status: ${STATUS} | branch: ${BRANCH} | sha: ${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
name: Build Service Images

on:
  push:
    branches: [main, development, feature/DevOpsTest]
    paths:
      - services/gtfs/**
      - services/auth-new/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: gtfs
            dockerfile: services/gtfs/Dockerfile
            context: services/gtfs
            image_name: gtfs
          - service_name: auth-new
            dockerfile: services/auth-new/Dockerfile
            context: services/auth-new
            image_name: auth-new

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${{ github.repository_owner }}/${{ matrix.image_name }}"
          echo "IMAGE_NAME_LC=$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }}

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[Service Build] status: ${STATUS} | branch: ${BRANCH} | service: ${{ matrix.service_name }} | image: ${REGISTRY}/${IMAGE_NAME_LC}:${{ github.sha }} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
name: AUTH CI

on:
  push:
    branches: ["main", "development", "svc/**", "feature/DevOpsTest"]
    paths:
      - services/auth-new/**
      - .github/workflows/auth.yml
  pull_request:
    branches: ["main", "development"]
    paths:
      - services/auth-new/**
      - .github/workflows/auth.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-new
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PYTHON_VERSION: "3.13"
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: 5432
      FLASK_ENV: testing
      JWT_SECRET: test-jwt-secret
      SQLALCHEMY_TRACK_MODIFICATIONS: "False"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (fail on error)
        run: |
          flake8 src

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-coverage-report
          path: coverage.xml

      - name: Smoke test (app boot)
        run: |
          python run.py &
          for i in {1..10}; do
            curl -sf http://localhost:5000/health && break
            echo "Waiting for app... attempt $i"
            sleep 2
          done

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[AUTH CI] status: ${STATUS} | branch: ${BRANCH} | actor: ${ACTOR} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"

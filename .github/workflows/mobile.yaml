name: Expo CI

on:
  push:
    branches: ["main", "dev/mobile", "development", "feature/DevOpsTest"]
  pull_request:
    branches: ["main", "development", "svc/**", "feature/DevOpsTest"]

defaults:
  run:
    working-directory: CGMplus

jobs:
  expo-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CGMplus/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test --if-present

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Validate Expo config
        run: expo config --non-interactive

      - name: Prebuild (sanity check)
        run: npx expo prebuild --no-install --non-interactive

      - name: Export app (Expo Go compatibility check)
        run: npx expo export --platform web

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"[Mobile CI] status: ${STATUS} | branch: ${BRANCH} | actor: ${ACTOR} | ${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"

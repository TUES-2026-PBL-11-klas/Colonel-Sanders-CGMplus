name: Expo CI

on:
  push:
    branches:
      - dev/mobile
  pull_request:
    branches:
      - dev/mobile

defaults:
  run:
    working-directory: CGMplus

jobs:
  expo-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CGMplus/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test --if-present

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Validate Expo config
        run: expo config --non-interactive

      - name: Prebuild (sanity check)
        run: npx expo prebuild --no-install --non-interactive

      - name: Export app (Expo Go compatibility check)
        run: npx expo export --platform web
